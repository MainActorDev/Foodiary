name: Foodiary
options:
  bundleIdPrefix: com.foodiary
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "26.4"
  generateEmptyDirectories: true
  developmentLanguage: en

settings:
  base:
    DEVELOPMENT_TEAM: "SMSH6V2XQN"
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    SWIFT_VERSION: "6.0"

targets:
  Foodiary:
    type: application
    platform: iOS
    sources:
      - path: Foodiary
    settings:
      base:
        INFOPLIST_FILE: Foodiary/Info.plist
        PRODUCT_NAME: Foodiary
        PRODUCT_BUNDLE_IDENTIFIER: com.his.foodiary.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
    preBuildScripts:
      - name: "SwiftLint (disabled)"
        script: |
          echo "No SwiftLint configured"
        basedOnDependencyAnalysis: false
    configFiles:
      Debug: Configuration/Debug.xcconfig
      Release: Configuration/Release.xcconfig

  FoodiaryTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FoodiaryTests
    dependencies:
      - target: Foodiary
    settings:
      base:
        INFOPLIST_FILE: FoodiaryTests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.his.foodiary.app.tests
