<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foodiary — Calorie Ring · Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   1. PAGE-LEVEL RESET & STRUCTURE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: #E8E5DF;
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh; min-height: 100dvh;
  padding: clamp(16px, 3vw, 32px) clamp(12px, 3vw, 24px) clamp(24px, 4vw, 48px);
  gap: clamp(16px, 3vw, 32px);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

.page-header { text-align: center; max-width: 600px; padding: 0 clamp(8px, 2vw, 16px); }
.page-header h1 { font-family: 'Inter', -apple-system, sans-serif; font-size: clamp(20px, 4vw, 24px); font-weight: 700; color: #1A1A1A; letter-spacing: -0.02em; margin-bottom: 4px; }
.page-header p { font-size: clamp(12px, 2.2vw, 14px); color: #6B6560; line-height: 1.5; }

/* ============================================================
   2. CONCEPT SELECTOR
   ============================================================ */
.concept-selector { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; background: #FFFFFF; border: 2px solid #E2E0DA; border-radius: clamp(12px, 2vw, 14px); padding: 4px; max-width: 100%; }
.concept-option { padding: clamp(6px, 1.2vw, 8px) clamp(12px, 2.5vw, 20px); border: none; background: transparent; border-radius: clamp(8px, 1.5vw, 10px); font-family: 'Inter', -apple-system, sans-serif; font-size: clamp(11px, 1.8vw, 13px); font-weight: 600; color: #6B6560; cursor: pointer; transition: all 0.15s ease; white-space: nowrap; }
.concept-option:hover { color: #1A1A1A; }
.concept-option.active { background: #2563EB; color: #FFFFFF; box-shadow: 0 2px 8px rgba(37,99,235,0.25); }

/* ============================================================
   3. MOCKUP CONTAINER + PHONE
   ============================================================ */
.mockup-container { display: flex; justify-content: center; align-items: flex-start; width: 100%; max-width: 420px; }
.phone-wrapper { width: clamp(280px, 90vw, 375px); position: relative; }
.phone { width: 375px; height: 812px; background: var(--bg); border-radius: clamp(32px, 6vw, 40px); overflow: hidden; position: absolute; top: 0; left: 0; box-shadow: 0 20px 60px rgba(0,0,0,0.18), 0 0 0 3px var(--border-color, #1A1A1A); display: flex; flex-direction: column; transform-origin: top left; transition: background 0.3s ease, box-shadow 0.3s ease; -webkit-font-smoothing: antialiased; backface-visibility: hidden; }
.phone-status { height: 44px; background: var(--bg); display: flex; justify-content: space-between; align-items: center; padding: 0 24px; font-size: 12px; font-weight: 700; font-family: var(--font-display); color: var(--text); flex-shrink: 0; transition: background 0.3s ease; }
.screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.screen.active { display: flex; }
.screen-scroll { overflow-y: auto; }
.screen-content { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 24px; }
.screen-content.center { justify-content: center; align-items: center; text-align: center; }
.screen-content.compact { gap: 16px; }

/* ============================================================
   4. TYPOGRAPHY SCALE
   ============================================================ */
.t-hero { font-family: var(--font-display); font-size: var(--fs-hero, 40px); font-weight: 700; line-height: 1.1; letter-spacing: -0.03em; color: var(--text); }
.t-title { font-family: var(--font-display); font-size: var(--fs-title, 22px); font-weight: 700; line-height: 1.2; color: var(--text); }
.t-body { font-family: var(--font-body); font-size: 15px; line-height: 1.5; color: var(--text); }
.t-caption { font-family: var(--font-body); font-size: 13px; line-height: 1.5; color: var(--muted-fg); }
.t-label { font-family: var(--font-display); font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text); }
.t-metric { font-family: var(--font-display); font-size: 28px; font-weight: 700; line-height: 1; color: var(--text); }

/* ============================================================
   5. SHARED COMPONENTS
   ============================================================ */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 24px; font-family: var(--font-display); font-size: 15px; font-weight: 700; cursor: pointer; border: var(--btn-border); border-radius: var(--radius-btn, 12px); transition: all 0.12s ease; width: 100%; text-align: center; text-transform: uppercase; letter-spacing: 0.02em; line-height: 1.2; user-select: none; }
.btn:active { transform: var(--btn-active-transform, scale(0.97)); box-shadow: var(--btn-active-shadow); }
.btn-primary { background: var(--accent); color: var(--btn-primary-text, #FFFFFF); box-shadow: var(--shadow); }
.btn-secondary { background: var(--card); color: var(--text); box-shadow: var(--shadow); }
.btn-ghost { background: transparent; color: var(--accent); border: none; box-shadow: none; text-transform: none; letter-spacing: 0; font-size: 14px; width: auto; padding: 8px 12px; }
.btn-sm { padding: 8px 16px; font-size: 12px; border-radius: var(--radius-sm, 8px); width: auto; }

.card { background: var(--card); border: var(--card-border); border-radius: var(--radius-card, 20px); padding: 20px; box-shadow: var(--shadow); }
.card-sm { background: var(--card); border: var(--card-border); border-radius: var(--radius-meal, 16px); padding: 16px; box-shadow: var(--shadow-sm); }

.summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.summary-tile { background: var(--card); border: var(--card-border); border-radius: var(--radius-meal, 16px); padding: 16px; box-shadow: var(--shadow-sm); text-align: center; }
.summary-val { font-family: var(--font-display); font-size: 24px; font-weight: 700; color: var(--text); line-height: 1; }
.summary-lbl { font-family: var(--font-display); font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted-fg); margin-top: 6px; }

.badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 9999px; font-family: var(--font-display); font-size: 11px; font-weight: 700; border: var(--badge-border); text-transform: uppercase; letter-spacing: 0.04em; align-self: flex-start; }
.badge.green { background: var(--badge-green-bg); color: var(--badge-green-text); }
.badge.red   { background: var(--badge-red-bg);   color: var(--badge-red-text); }
.badge.yellow{ background: var(--badge-yellow-bg); color: var(--badge-yellow-text); }

.meal-card { background: var(--card); border: var(--card-border); border-radius: var(--radius-meal, 16px); padding: 16px; box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 14px; cursor: pointer; transition: all 0.1s ease; }
.meal-card:active { transform: var(--btn-active-transform, scale(0.98)); box-shadow: var(--btn-active-shadow, var(--shadow-sm)); }
.meal-card.readonly { cursor: default; opacity: 0.85; }
.meal-card.readonly:active { transform: none; box-shadow: var(--shadow-sm); }
.meal-icon-block { width: 48px; height: 48px; border-radius: var(--radius-sm, 8px); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; border: 2px solid var(--border-color); }
.meal-icon-block.breakfast { background: var(--meal-bf-bg, #FFF3E0); }
.meal-icon-block.lunch     { background: var(--meal-lu-bg, #E0F7FA); }
.meal-icon-block.snack     { background: var(--meal-sn-bg, #FCE4EC); }
.meal-icon-block.dinner    { background: var(--meal-dn-bg, #E8EAF6); }
.meal-body { flex: 1; min-width: 0; }
.meal-name { font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.3; }
.meal-meta { font-family: var(--font-body); font-size: 12px; color: var(--muted-fg); margin-top: 2px; }
.meal-cal { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--text); text-align: right; }
.meal-cal small { font-family: var(--font-body); font-size: 11px; font-weight: 400; color: var(--muted-fg); display: block; }

.progress-wrap { margin-top: 12px; }
.progress-bar { height: var(--progress-h, 10px); background: var(--muted); border: var(--progress-border, none); border-radius: 9999px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 9999px; background: var(--secondary); transition: width 0.4s ease; }
.progress-fill.over { background: var(--accent); }

.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-label { font-family: var(--font-display); font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text); margin-bottom: 2px; }
.form-input { padding: 12px 14px; border: var(--field-border); border-radius: var(--radius-btn, 12px); background: var(--card); font-family: var(--font-body); font-size: 15px; color: var(--text); width: 100%; }
.form-input:focus { outline: none; border-color: var(--accent); }
.form-hint { font-family: var(--font-body); font-size: 12px; color: var(--muted-fg); margin-top: 2px; }

.segmented { display: flex; background: var(--muted); border: var(--seg-border); border-radius: var(--radius-btn, 12px); padding: 3px; gap: 2px; }
.segmented button { flex: 1; padding: 10px 12px; border: 2px solid transparent; border-radius: var(--radius-sm, 8px); font-family: var(--font-display); font-size: 12px; font-weight: 700; cursor: pointer; background: transparent; color: var(--muted-fg); transition: all 0.1s ease; text-transform: uppercase; letter-spacing: 0.02em; white-space: nowrap; }
.segmented button.active { background: var(--card); color: var(--text); border-color: var(--border-color); box-shadow: var(--seg-active-shadow); }

.stepper { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 10px; background: var(--card); border: var(--card-border); border-radius: var(--radius-btn, 12px); }
.stepper button { width: 36px; height: 36px; border-radius: var(--radius-sm, 8px); border: 2px solid var(--border-color); background: var(--card); font-family: var(--font-display); font-size: 18px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text); box-shadow: var(--shadow-sm); transition: all 0.1s; }
.stepper button:active { transform: translate(1px, 1px); box-shadow: var(--stepper-active-shadow); }
.stepper .val { font-family: var(--font-display); font-size: 24px; font-weight: 700; min-width: 48px; text-align: center; color: var(--text); }

.nav-header { display: flex; align-items: center; padding: 8px 16px; min-height: 48px; gap: 12px; flex-shrink: 0; }
.nav-back { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--border-color); background: var(--card); cursor: pointer; font-family: var(--font-display); font-size: 16px; border-radius: var(--radius-sm, 8px); color: var(--text); box-shadow: var(--shadow-sm); transition: all 0.1s; }
.nav-back:active { transform: var(--btn-active-transform, translate(1px,1px)); box-shadow: var(--stepper-active-shadow); }
.nav-title { font-family: var(--font-display); font-size: 18px; font-weight: 700; flex: 1; color: var(--text); }

.disclaimer { font-family: var(--font-body); font-size: 11px; color: var(--muted-fg); text-align: center; line-height: 1.5; font-style: italic; max-width: 280px; margin: 0 auto; }
.food-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1.5px solid var(--divider, var(--muted)); }
.food-row:last-child { border-bottom: none; }
.food-info { flex: 1; }
.food-info .fn { font-family: var(--font-display); font-size: 14px; font-weight: 700; color: var(--text); }
.food-info .fnote { font-family: var(--font-body); font-size: 12px; color: var(--muted-fg); margin-top: 1px; }
.food-cals { font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--text); }
.btn-icon-del { width: 28px; height: 28px; border-radius: var(--radius-sm, 8px); border: 2px solid var(--border-color); background: var(--btn-black-bg, var(--text)); color: var(--btn-black-text, #FFF); cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 12px; box-shadow: var(--shadow-sm); transition: all 0.1s; }
.btn-icon-del:active { transform: scale(0.93); }

/* ============================================================
   6. CALORIE RING THEME
   ============================================================ */
.theme-ring {
  --font-display: 'Inter', -apple-system, sans-serif;
  --font-body: 'Inter', -apple-system, sans-serif;
  --accent: #2563EB; --secondary: #059669; --warning: #D97706;
  --bg: #F8FAFC; --card: #FFFFFF; --text: #0F172A;
  --muted: #F1F5F9; --muted-fg: #64748B;
  --border-color: #CBD5E1; --divider: #F1F5F9;
  --radius-sm: 8px; --radius-btn: 12px; --radius-card: 20px; --radius-meal: 14px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --btn-border: 1.5px solid #CBD5E1; --btn-active-transform: scale(0.98);
  --btn-active-shadow: 0 1px 2px rgba(0,0,0,0.04);
  --card-border: 1.5px solid #E2E8F0; --field-border: 1.5px solid #CBD5E1;
  --badge-border: 1.5px solid #CBD5E1; --seg-border: 1.5px solid #CBD5E1;
  --seg-active-shadow: 0 1px 3px rgba(0,0,0,0.06); --progress-h: 8px; --progress-border: none;
  --stepper-active-shadow: 0 1px 2px rgba(0,0,0,0.04);
  --btn-primary-text: #FFFFFF; --btn-black-bg: #0F172A; --btn-black-text: #FFFFFF;
  --fs-hero: 36px; --fs-title: 20px;
  --badge-green-bg: #D1FAE5; --badge-green-text: #065F46;
  --badge-red-bg: #FEE2E2; --badge-red-text: #991B1B;
  --badge-yellow-bg: #FEF3C7; --badge-yellow-text: #92400E;
  --meal-bf-bg: #EFF6FF; --meal-lu-bg: #ECFDF5;
  --meal-sn-bg: #FDF2F8; --meal-dn-bg: #F5F3FF;
}

/* Ring components */
.ring-container { display: flex; justify-content: center; padding: 8px 0 16px; }
.ring-center-wrap { position: relative; width: 172px; height: 172px; }
.ring-svg { transform: rotate(-90deg); width: 172px; height: 172px; }
.ring-bg { fill: none; stroke: var(--muted); stroke-width: 14; }
.ring-fill { fill: none; stroke: var(--accent); stroke-width: 14; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }
.ring-center-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.ring-number { font-family: var(--font-display); font-size: 40px; font-weight: 800; color: var(--text); line-height: 1; }
.ring-sub { font-family: var(--font-display); font-size: 11px; font-weight: 600; color: var(--muted-fg); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 4px; }
.macro-row { display: flex; align-items: center; gap: 10px; padding: 2px 0; }
.macro-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.macro-dot.protein { background: #2563EB; } .macro-dot.carbs { background: #D97706; } .macro-dot.fat { background: #DC2626; }
.macro-label { font-family: var(--font-body); font-size: 13px; font-weight: 600; color: var(--text); width: 52px; }
.macro-bar-wrap { flex: 1; height: 8px; background: var(--muted); border-radius: 4px; overflow: hidden; }
.macro-bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s ease; }
.macro-bar-fill.protein { background: #2563EB; } .macro-bar-fill.carbs { background: #D97706; } .macro-bar-fill.fat { background: #DC2626; }
.macro-val { font-family: var(--font-display); font-size: 13px; font-weight: 700; color: var(--text); min-width: 32px; text-align: right; }
.ring-meal-icon { font-size: 18px; width: 40px; text-align: center; flex-shrink: 0; }

/* Ring tab bar */
.ring-tabs { display: flex; background: var(--card); border-top: 1px solid var(--border-color); padding: 8px 16px 24px; gap: 0; flex-shrink: 0; }
.ring-tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 0; border: none; background: none; cursor: pointer; font-family: var(--font-display); font-size: 10px; font-weight: 600; color: var(--muted-fg); letter-spacing: 0.01em; }
.ring-tab.active { color: var(--accent); }
.ring-tab-icon { font-size: 20px; }

/* ============================================================
   7. PLAN PAGE — WEEK STRIP
   ============================================================ */
.week-nav-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.week-nav-arrow { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border: 1.5px solid var(--border-color); border-radius: var(--radius-sm); background: var(--card); cursor: pointer; font-family: var(--font-display); font-size: 14px; color: var(--text); box-shadow: var(--shadow-sm); transition: all 0.1s; flex-shrink: 0; }
.week-nav-arrow:active { transform: scale(0.94); box-shadow: var(--btn-active-shadow); }
.week-label-text { font-family: var(--font-display); font-size: 14px; font-weight: 700; color: var(--text); text-align: center; flex: 1; user-select: none; }

.week-strip { display: flex; gap: 6px; justify-content: center; }
.week-day-pill { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 2px; border-radius: var(--radius-meal); border: 1.5px solid transparent; background: transparent; cursor: pointer; transition: all 0.12s ease; user-select: none; }
.week-day-pill:hover { background: var(--muted); }
.week-day-pill:active { transform: scale(0.95); }
.week-day-pill.today { background: var(--muted); border-color: var(--border-color); }
.week-day-pill.selected { background: var(--accent); border-color: var(--accent); }
.week-day-pill.selected .week-dow,
.week-day-pill.selected .week-date-num { color: #FFFFFF; }
.week-dow { font-family: var(--font-display); font-size: 10px; font-weight: 600; color: var(--muted-fg); text-transform: uppercase; letter-spacing: 0.03em; }
.week-date-num { font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--text); }
.week-day-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--secondary); }
.week-day-dot.over { background: var(--accent); }
.week-day-dot.empty { background: transparent; }

.plan-day-header { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
.plan-day-title { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--text); }
.plan-day-sub { font-family: var(--font-body); font-size: 13px; color: var(--muted-fg); }
.plan-day-sub b { color: var(--text); }
.plan-readonly-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 9999px; font-family: var(--font-display); font-size: 10px; font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase; background: var(--muted); color: var(--muted-fg); border: 1px solid var(--border-color); }
.plan-empty-state { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 32px 24px; text-align: center; }
.plan-empty-icon { font-size: 40px; opacity: 0.4; }
.plan-empty-title { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--text); }
.plan-empty-body { font-family: var(--font-body); font-size: 13px; color: var(--muted-fg); max-width: 220px; line-height: 1.5; }

/* ============================================================
   8. ONBOARDING (shared)
   ============================================================ */
.onboard-dots { display: flex; gap: 8px; justify-content: center; padding: 0 0 4px; }
.onboard-dots .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); border: 2px solid var(--border-color); transition: all 0.2s; }
.onboard-dots .dot.active { background: var(--accent); width: 24px; border-radius: 4px; }
.cal-hero { text-align: center; padding: 24px 0 8px; }
.cal-hero-num { font-family: var(--font-display); font-size: 52px; font-weight: 700; color: var(--accent); line-height: 1; }
.cal-hero-unit { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--text); margin-top: 4px; }
.cal-stat-row { display: flex; gap: 12px; justify-content: center; margin-top: 16px; }
.cal-stat-box { text-align: center; padding: 12px 16px; background: var(--card); border: 2px solid var(--border-color); border-radius: var(--radius-btn, 12px); box-shadow: var(--shadow-sm); min-width: 72px; }
.cal-stat-box .sv { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--text); }
.cal-stat-box .sl { font-family: var(--font-display); font-size: 9px; font-weight: 700; color: var(--muted-fg); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 2px; }
.profile-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1.5px solid var(--divider); }
.profile-row:last-child { border-bottom: none; }
.profile-row-lbl { font-family: var(--font-body); font-size: 14px; color: var(--muted-fg); }
.profile-row-val { font-family: var(--font-display); font-size: 14px; font-weight: 700; color: var(--text); }
.empty-state { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 48px 24px; text-align: center; }
.empty-icon { font-size: 48px; opacity: 0.5; }
.empty-title { font-family: var(--font-display); font-size: 17px; font-weight: 700; color: var(--text); }
.empty-body { font-family: var(--font-body); font-size: 14px; color: var(--muted-fg); max-width: 240px; }

/* ============================================================
   9. RESPONSIVE
   ============================================================ */
@media (max-width: 768px) { body { padding: 12px 12px 24px; gap: 16px; } .page-header h1 { font-size: 18px; } .concept-option { padding: 6px 14px; font-size: 12px; } .mockup-container { max-width: 100%; } }
@media (max-width: 480px) { .concept-selector { gap: 3px; padding: 3px; border-radius: 10px; } .concept-option { padding: 5px 10px; font-size: 11px; border-radius: 7px; } }
@media (max-height: 700px) { body { gap: 12px; padding-top: 10px; padding-bottom: 16px; } .page-header { margin-bottom: 0; } .page-header h1 { margin-bottom: 0; } .page-header p { display: none; } }
</style>
</head>
<body>

<div class="page-header">
  <h1>Foodiary · Calorie Ring · Plan</h1>
  <p>Week strip calendar with date-based meal planning. Swipe or arrows to change weeks.</p>
</div>

<div class="concept-selector" id="conceptSelector">
  <button class="concept-option active" data-concept="ring" onclick="switchConcept('ring',this)">Calorie Ring</button>
</div>

<div class="mockup-container">
  <div class="phone-wrapper">
    <div class="phone theme-ring" id="phone"></div>
  </div>
</div>

<script>
// ============================================================
// SHARED DATA MODEL
// ============================================================
let P = { age:30, sex:'female', height:170, weight:70, activity:'sedentary', goal:'maintain' };
let CT = null, mi = 0;
const MT = ['breakfast','lunch','snack','dinner'];
const MI = {breakfast:'🌅',lunch:'☀️',snack:'🍪',dinner:'🌙'};
const C = 2*Math.PI*68;
let currentScreen = 'today';

// Multi-date meal plan storage: keyed by "yyyy-MM-dd"
let mealPlans = {};

// Today's date reference (for determining past/future)
const TODAY = new Date(2026, 5, 21); // June 21, 2026 (Sunday)
const TODAY_KEY = dateKey(TODAY);

// Week navigation state
let weekOffset = 0; // 0 = current week

// Currently selected date in the Plan view
let selectedDateKey = TODAY_KEY;

function dateKey(d){ const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${day}`; }
function parseDate(k){ const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d); }
function isToday(k){ return k === TODAY_KEY; }
function isPast(k){ return k < TODAY_KEY; }
function isFuture(k){ return k > TODAY_KEY; }

// Get the current meal plan (active from the Plan view)
function activePlan(){ return mealPlans[selectedDateKey] || null; }
function activePlanOrCreate(){
  if (!mealPlans[selectedDateKey]) mealPlans[selectedDateKey] = {meals: MT.map(t=>({type:t,items:[]}))};
  return mealPlans[selectedDateKey];
}

// Today's meal plan convenience (for Today tab)
function todayPlan() { return mealPlans[TODAY_KEY] || null; }

function mc(m){ return m.items.reduce((s,i)=>s+(i.calories||0),0); }
function tcPlan(p){ return p ? p.meals.reduce((s,m)=>s+mc(m),0) : 0; }
function tgt(){ return CT ? CT.target : 2100; }
function S(p){
  let rem = tgt() - tcPlan(p);
  let pct = Math.min(100, Math.max(0, (tcPlan(p) / tgt()) * 100));
  return { remaining: rem, pct, badge: rem>0?'green':rem<0?'red':'yellow',
    label: rem>0 ? rem.toLocaleString()+' kcal under target' :
           rem<0 ? Math.abs(rem).toLocaleString()+' kcal over target' : 'Exactly at your target' };
}

function calc(){
  let {age,sex,height,weight,activity,goal}=P;
  let bmr=sex==='male'?10*weight+6.25*height-5*age+5:10*weight+6.25*height-5*age-161;
  let m=Math.round(bmr*{sedentary:1.2,lightlyActive:1.375,moderatelyActive:1.55,veryActive:1.725}[activity]);
  let tg=goal==='lose'?Math.round(m*0.9):goal==='gain'?Math.round(m*1.1):m;
  tg=Math.round(tg/10)*10;
  CT={bmr:Math.round(bmr),maintenance:m,target:tg};
}

function crtPlan(){
  if (!mealPlans[TODAY_KEY]) mealPlans[TODAY_KEY] = {meals: MT.map(t=>({type:t,items:[]}))};
}

function stp(f,d){ P[f]=Math.max(1,P[f]+d); renderCurrent(); }
function sel(g,v,b){ P[g]=v; document.querySelectorAll('[id^="sg-'+g+'"]').forEach(s=>s.querySelectorAll('button').forEach(btn=>{let bv=btn.textContent.toLowerCase().replace(/\s+/g,'');let m={'maintainweight':'maintain','loseweightslowly':'lose','gainweightslowly':'gain','sedentary':'sedentary','lightlyactive':'lightlyActive','moderate':'moderatelyActive','moderatelyactive':'moderatelyActive','veryactive':'veryActive','female':'female','male':'male'};btn.classList.toggle('active',(m[bv]||bv)===v);}));}
function onav(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); let t=document.getElementById(id); if(t)t.classList.add('active'); currentScreen=id; }

// ============================================================
// WEEK CALENDAR HELPERS
// ============================================================

// Get Monday of the week containing `date`, offset by `weekOffset` weeks
function getWeekStart(date, offset){
  let d = new Date(date);
  let day = d.getDay(); // 0=Sun, 1=Mon, ...
  let diff = day === 0 ? -6 : 1 - day; // Monday offset
  d.setDate(d.getDate() + diff + (offset * 7));
  d.setHours(0,0,0,0);
  return d;
}

function getWeekDays(weekStart){
  let days = [];
  for (let i = 0; i < 7; i++){
    let d = new Date(weekStart);
    d.setDate(d.getDate() + i);
    let k = dateKey(d);
    days.push({
      key: k,
      date: d,
      dayNum: d.getDate(),
      dow: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][i],
      isToday: isToday(k),
      plan: mealPlans[k] || null
    });
  }
  return days;
}

function formatWeekRange(weekStart){
  let end = new Date(weekStart);
  end.setDate(end.getDate() + 6);
  let months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let sm = months[weekStart.getMonth()], em = months[end.getMonth()];
  if (sm === em) return `${sm} ${weekStart.getDate()} – ${end.getDate()}, ${weekStart.getFullYear()}`;
  return `${sm} ${weekStart.getDate()} – ${em} ${end.getDate()}, ${weekStart.getFullYear()}`;
}

function navigateWeek(delta){
  weekOffset += delta;
  selectedDateKey = dateKey(getWeekStart(TODAY, weekOffset));
  renderRingPlan();
  onav('plan');
}

function selectDay(key){
  selectedDateKey = key;
  // Auto-navigate week if selected date is outside current visible week
  let selDate = parseDate(key);
  let ws = getWeekStart(TODAY, weekOffset);
  let we = new Date(ws); we.setDate(we.getDate() + 6);
  if (selDate < ws || selDate > we){
    // Calculate which week this date belongs to relative to today
    let todayWeekStart = getWeekStart(TODAY, 0);
    let diffDays = Math.floor((selDate - todayWeekStart) / (1000*60*60*24));
    weekOffset = Math.floor(diffDays / 7);
  }
  renderRingPlan();
}

// ============================================================
// FOOD ENTRY
// ============================================================
function openAdd(type){
  let plan = activePlanOrCreate();
  mi = plan.meals.findIndex(m=>m.type===type);
  let el=document.getElementById('add-food'); if(!el)return;
  el.innerHTML=`<div class="nav-header"><button class="nav-back" onclick="goBackFromAdd()">←</button><span class="nav-title">Add to ${type.charAt(0).toUpperCase()+type.slice(1)}</span></div><div class="screen-content compact"><div class="form-group"><span class="form-label">Food Name</span><input class="form-input" id="af-name" type="text" placeholder="e.g. Chicken breast"></div><div class="form-group"><span class="form-label">Calories (kcal)</span><input class="form-input" id="af-cals" type="number" placeholder="0"><span class="form-hint">Whole number, 0 or greater.</span></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px"><div class="form-group"><span class="form-label">Protein g</span><input class="form-input" id="af-p" type="number" placeholder="0"></div><div class="form-group"><span class="form-label">Carbs g</span><input class="form-input" id="af-cb" type="number" placeholder="0"></div><div class="form-group"><span class="form-label">Fat g</span><input class="form-input" id="af-f" type="number" placeholder="0"></div></div><div class="form-group"><span class="form-label">Note (optional)</span><input class="form-input" id="af-note" type="text" placeholder="e.g. Grilled, no oil"></div><div style="flex:1"></div><button class="btn btn-primary" onclick="addFoodItem()">Save Food Item</button><button class="btn btn-secondary" onclick="goBackFromAdd()">Cancel</button></div>`;
  onav('add-food');
}

function goBackFromAdd(){
  if (currentScreen === 'plan' || document.getElementById('plan')?.classList.contains('active')){
    renderRingPlan(); onav('plan');
  } else {
    renderRingToday(); onav('today');
  }
}

function addFoodItem(){
  let n=document.getElementById('af-name').value.trim(), c=parseInt(document.getElementById('af-cals').value.trim()), o=(document.getElementById('af-note')||{}).value||'';
  if(!n){document.getElementById('af-name').classList.add('error');return;}
  if(isNaN(c)||c<0){document.getElementById('af-cals').classList.add('error');return;}
  let item={name:n,calories:c,note:o.trim()};
  let p=document.getElementById('af-p'); if(p){let pv=parseInt(p.value.trim())||0;if(pv>=0)item.protein=pv;}
  let cb=document.getElementById('af-cb'); if(cb){let cv=parseInt(cb.value.trim())||0;if(cv>=0)item.carbs=cv;}
  let f=document.getElementById('af-f'); if(f){let fv=parseInt(f.value.trim())||0;if(fv>=0)item.fat=fv;}
  mealPlans[selectedDateKey].meals[mi].items.push(item);
  goBackFromAdd();
}

// ============================================================
// DISPATCH
// ============================================================
function renderToday(){ renderRingToday(); }
function renderCurrent(){
  if (currentScreen === 'plan' || document.getElementById('plan')?.classList.contains('active')){
    renderRingPlan(); onav('plan');
  } else if (currentScreen === 'insights') {
    renderRingInsights(); onav('insights');
  } else {
    renderRingToday(); onav('today');
  }
}

// ============================================================
// TODAY VIEW (Calorie Ring dashboard)
// ============================================================
function renderRingToday(){
  let el=document.getElementById('today'); if(!el)return;
  let plan = todayPlan();
  if(!plan){ el.innerHTML=renderEmptyState(); return; }
  let tot = tcPlan(plan), t = tgt(), s = S(plan), ringOff = C*(1 - s.pct/100);
  let prot=plan.meals.reduce((s,m)=>s+m.items.reduce((ss,i)=>ss+(i.protein||0),0),0);
  let carb=plan.meals.reduce((s,m)=>s+m.items.reduce((ss,i)=>ss+(i.carbs||0),0),0);
  let fatv=plan.meals.reduce((s,m)=>s+m.items.reduce((ss,i)=>ss+(i.fat||0),0),0);
  let mmax=Math.max(prot,carb,fatv,1);
  let meals=plan.meals.map(m=>{let c=mc(m);return`<div class="meal-card" style="gap:10px" onclick="selectedDateKey=TODAY_KEY;openAdd('${m.type}')"><span class="ring-meal-icon">${MI[m.type]}</span><div class="meal-body"><div class="meal-name">${m.type.charAt(0).toUpperCase()+m.type.slice(1)}</div><div class="meal-meta">${m.items.length} items</div></div><div class="meal-cal">${c}<small>kcal</small></div></div>`;}).join('');
  el.innerHTML=`<div class="nav-header"><span class="nav-title">Today</span></div><div class="screen-content compact"><div class="ring-container"><div class="ring-center-wrap"><svg class="ring-svg" viewBox="0 0 172 172"><circle class="ring-bg" cx="86" cy="86" r="68"/><circle class="ring-fill" cx="86" cy="86" r="68" stroke-dasharray="${C}" stroke-dashoffset="${ringOff}"/></svg><div class="ring-center-text"><div class="ring-number">${tot.toLocaleString()}</div><div class="ring-sub">of ${t.toLocaleString()} kcal</div></div></div></div><span class="badge ${s.badge}">${s.label}</span><div class="card-sm" style="display:flex;flex-direction:column;gap:8px"><span class="t-label">Macronutrients</span><div class="macro-row"><div class="macro-dot protein"></div><span class="macro-label">Protein</span><div class="macro-bar-wrap"><div class="macro-bar-fill protein" style="width:${(prot/mmax)*100}%"></div></div><span class="macro-val">${prot}g</span></div><div class="macro-row"><div class="macro-dot carbs"></div><span class="macro-label">Carbs</span><div class="macro-bar-wrap"><div class="macro-bar-fill carbs" style="width:${(carb/mmax)*100}%"></div></div><span class="macro-val">${carb}g</span></div><div class="macro-row"><div class="macro-dot fat"></div><span class="macro-label">Fat</span><div class="macro-bar-wrap"><div class="macro-bar-fill fat" style="width:${(fatv/mmax)*100}%"></div></div><span class="macro-val">${fatv}g</span></div></div><span class="t-label">Meals</span>${meals}</div>`;
  addConceptNav('today');
}

// ============================================================
// PLAN VIEW (Week strip + date-based meal planning)
// ============================================================
function renderRingPlan(){
  let el=document.getElementById('plan'); if(!el)return;

  let ws = getWeekStart(TODAY, weekOffset);
  let weekDays = getWeekDays(ws);
  let weekLabel = formatWeekRange(ws);

  // Build week strip
  let dayPills = weekDays.map(d => {
    let cls = 'week-day-pill';
    if (d.isToday) cls += ' today';
    if (d.key === selectedDateKey) cls += ' selected';
    let dotCls = 'week-day-dot empty';
    if (d.plan && d.plan.meals.some(m=>m.items.length>0)){
      let planCal = tcPlan(d.plan);
      let sday = S(d.plan);
      dotCls = sday.remaining < 0 ? 'week-day-dot over' : 'week-day-dot';
    }
    return `<div class="${cls}" onclick="selectDay('${d.key}')">
      <span class="week-dow">${d.dow}</span>
      <span class="week-date-num">${d.dayNum}</span>
      <span class="${dotCls}"></span>
    </div>`;
  }).join('');

  // Selected day details
  let selDate = parseDate(selectedDateKey);
  let selPlan = mealPlans[selectedDateKey] || null;
  let selIsToday = isToday(selectedDateKey);
  let selIsPast = isPast(selectedDateKey);
  let selIsFuture = isFuture(selectedDateKey);
  let isReadonly = selIsPast; // past days are view-only

  let dayDetailHTML = '';
  if (selPlan){
    let tot = tcPlan(selPlan), t = tgt(), s = S(selPlan);
    let months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    let dayTitle = `${months[selDate.getMonth()]} ${selDate.getDate()}, ${selDate.getFullYear()}`;
    let dowLabel = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][selDate.getDay()];

    let mealsHTML = selPlan.meals.map(m => {
      let c = mc(m);
      if (isReadonly){
        // View-only: no onclick, subtle styling
        return `<div class="meal-card readonly" style="gap:10px">
          <span class="ring-meal-icon">${MI[m.type]}</span>
          <div class="meal-body">
            <div class="meal-name">${m.type.charAt(0).toUpperCase()+m.type.slice(1)}</div>
            <div class="meal-meta">${m.items.length} items</div>
          </div>
          <div class="meal-cal">${c}<small>kcal</small></div>
        </div>`;
      } else {
        return `<div class="meal-card" style="gap:10px" onclick="openAdd('${m.type}')">
          <span class="ring-meal-icon">${MI[m.type]}</span>
          <div class="meal-body">
            <div class="meal-name">${m.type.charAt(0).toUpperCase()+m.type.slice(1)}</div>
            <div class="meal-meta">${m.items.length} items</div>
          </div>
          <div class="meal-cal">${c}<small>kcal</small></div>
        </div>`;
      }
    }).join('');

    dayDetailHTML = `
      <div class="plan-day-header">
        <div>
          <div class="plan-day-title">${dowLabel}</div>
          <div class="plan-day-sub">${dayTitle} · <b>${tot.toLocaleString()}</b> / ${t.toLocaleString()} kcal</div>
        </div>
        ${isReadonly ? '<span class="plan-readonly-badge">🔒 View only</span>' : (selIsToday ? '<span class="plan-readonly-badge" style="background:#DBEAFE;color:#1E40AF;border-color:#BFDBFE">Today</span>' : '<span class="plan-readonly-badge" style="background:#F0FDF4;color:#166534;border-color:#BBF7D0">Planning</span>')}
      </div>
      <div class="progress-wrap" style="margin-top:0">
        <div class="progress-bar"><div class="progress-fill${s.remaining<0?' over':''}" style="width:${s.pct}%"></div></div>
      </div>
      <span class="badge ${s.badge}">${s.label}</span>
      <span class="t-label">Meals</span>
      ${mealsHTML}`;
  } else {
    // No meal plan for this day
    let months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    let dayTitle = `${months[selDate.getMonth()]} ${selDate.getDate()}, ${selDate.getFullYear()}`;
    let dowLabel = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][selDate.getDay()];

    if (isReadonly){
      dayDetailHTML = `
        <div class="plan-day-header">
          <div>
            <div class="plan-day-title">${dowLabel}</div>
            <div class="plan-day-sub">${dayTitle}</div>
          </div>
          <span class="plan-readonly-badge">🔒 View only</span>
        </div>
        <div class="plan-empty-state">
          <div class="plan-empty-icon">📋</div>
          <div class="plan-empty-title">No data for this day</div>
          <div class="plan-empty-body">You didn't log any meals on this date.</div>
        </div>`;
    } else {
      dayDetailHTML = `
        <div class="plan-day-header">
          <div>
            <div class="plan-day-title">${dowLabel}</div>
            <div class="plan-day-sub">${dayTitle}</div>
          </div>
          <span class="plan-readonly-badge" style="background:#F0FDF4;color:#166534;border-color:#BBF7D0">Planning</span>
        </div>
        <div class="plan-empty-state">
          <div class="plan-empty-icon">📝</div>
          <div class="plan-empty-title">No meal plan yet</div>
          <div class="plan-empty-body">Tap any meal slot below to start planning this day.</div>
        </div>
        <span class="t-label">Meals</span>
        ${MT.map(t => `<div class="meal-card" style="gap:10px" onclick="selectedDateKey='${selectedDateKey}';openAdd('${t}')"><span class="ring-meal-icon">${MI[t]}</span><div class="meal-body"><div class="meal-name">${t.charAt(0).toUpperCase()+t.slice(1)}</div><div class="meal-meta">0 items</div></div><div class="meal-cal">0<small>kcal</small></div></div>`).join('')}`;
    }
  }

  el.innerHTML = `<div class="nav-header"><span class="nav-title">Plan</span></div>
    <div class="screen-content compact">
      <div class="week-nav-row">
        <button class="week-nav-arrow" onclick="navigateWeek(-1)">←</button>
        <span class="week-label-text">${weekLabel}</span>
        <button class="week-nav-arrow" onclick="navigateWeek(1)">→</button>
      </div>
      <div class="week-strip">${dayPills}</div>
      ${dayDetailHTML}
    </div>`;
  addConceptNav('plan');
}

// ============================================================
// INSIGHTS VIEW
// ============================================================
function renderRingInsights(){
  let el=document.getElementById('insights'); if(!el)return;
  let plan = todayPlan();
  let tot = tcPlan(plan);
  let s = plan ? S(plan) : {badge:'yellow',label:'No data yet'};
  let prot=plan?plan.meals.reduce((s,m)=>s+m.items.reduce((ss,i)=>ss+(i.protein||0),0),0):0;
  let carb=plan?plan.meals.reduce((s,m)=>s+m.items.reduce((ss,i)=>ss+(i.carbs||0),0),0):0;
  let fatv=plan?plan.meals.reduce((s,m)=>s+m.items.reduce((ss,i)=>ss+(i.fat||0),0),0):0;
  el.innerHTML=`<div class="nav-header"><span class="nav-title">Insights</span></div><div class="screen-content compact"><div class="card"><span class="t-label" style="display:block;margin-bottom:12px">Calories</span><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;text-align:center"><div><div class="t-metric" style="color:var(--accent)">${tot.toLocaleString()}</div><span class="t-caption">Consumed</span></div><div><div class="t-metric">${tgt().toLocaleString()}</div><span class="t-caption">Target</span></div></div></div><div class="card-sm"><span class="t-label" style="display:block;margin-bottom:10px">Macros</span><div class="macro-row"><div class="macro-dot protein"></div><span class="macro-label">Protein</span><span class="macro-val">${prot}g</span></div><div class="macro-row"><div class="macro-dot carbs"></div><span class="macro-label">Carbs</span><span class="macro-val">${carb}g</span></div><div class="macro-row"><div class="macro-dot fat"></div><span class="macro-label">Fat</span><span class="macro-val">${fatv}g</span></div></div><span class="badge ${s.badge}">${s.label}</span></div>`;
  addConceptNav('insights');
}

// ============================================================
// ONBOARDING
// ============================================================
function renderOnboarding(id){
  let screens={
    'welcome':`<div class="screen-content center"><div style="font-size:64px;margin-bottom:8px">🥗</div><h1 class="t-title" style="font-size:34px;margin-bottom:4px">Foodiary</h1><p class="t-caption" style="max-width:260px">Plan your meals around a simple daily calorie target.</p><div style="height:24px"></div><button class="btn btn-primary" style="width:auto;padding:16px 48px" onclick="onav('profile-setup')">Get Started</button><p class="disclaimer" style="margin-top:24px">This app gives calorie estimates only — not medical or nutrition advice.</p></div>`,
    'profile-setup':`<div class="nav-header"><span class="nav-title">About You</span></div><div class="screen-content compact"><div class="onboard-dots"><div class="dot active"></div><div class="dot"></div><div class="dot"></div></div><p class="t-caption">Help us calculate your estimated daily calorie target.</p><div class="form-group"><span class="form-label">Age</span><div class="stepper"><button onclick="stp('age',-1)">−</button><span class="val" id="va-age">${P.age}</span><button onclick="stp('age',1)">+</button></div></div><div class="form-group"><span class="form-label">Sex</span><div class="segmented" id="sg-sex"><button class="${P.sex==='female'?'active':''}" onclick="sel('sex','female',this)">Female</button><button class="${P.sex==='male'?'active':''}" onclick="sel('sex','male',this)">Male</button></div></div><div class="form-group"><span class="form-label">Height (cm)</span><div class="stepper"><button onclick="stp('height',-1)">−</button><span class="val" id="va-height">${P.height}</span><button onclick="stp('height',1)">+</button></div></div><div class="form-group"><span class="form-label">Weight (kg)</span><div class="stepper"><button onclick="stp('weight',-1)">−</button><span class="val" id="va-weight">${P.weight}</span><button onclick="stp('weight',1)">+</button></div></div><div style="flex:1"></div><button class="btn btn-primary" onclick="onav('goal-setup')">Continue</button></div>`,

function renderCalResult(){
  let el=document.getElementById('calorie-result'); if(!el||!CT)return;
  el.innerHTML=`<div class="nav-header"><button class="nav-back" onclick="onav('goal-setup')">←</button><span class="nav-title">Your Target</span></div><div class="screen-content center"><div class="cal-hero"><p class="t-caption" style="margin-bottom:12px">Your estimated daily target is</p><div class="cal-hero-num">${CT.target.toLocaleString()}</div><div class="cal-hero-unit">kcal / day</div></div><div class="cal-stat-row"><div class="cal-stat-box"><div class="sv">${CT.bmr.toLocaleString()}</div><div class="sl">BMR</div></div><div class="cal-stat-box"><div class="sv">${CT.maintenance.toLocaleString()}</div><div class="sl">Maintenance</div></div><div class="cal-stat-box"><div class="sv">${CT.target.toLocaleString()}</div><div class="sl">Target</div></div></div><p class="t-caption" style="margin-top:8px">Use this as a planning guide, not a strict rule.</p><div style="flex:1"></div><button class="btn btn-primary" onclick="crtPlan();renderRingToday();onav('today')">Create Meal Plan</button><button class="btn btn-secondary" onclick="onav('goal-setup')">Edit Profile</button><p class="disclaimer" style="margin-top:12px">This is an estimate for planning purposes only. Consult a qualified health professional for medical advice.</p></div>`;
}

function renderProfile(){
  let el=document.getElementById('profile'); if(!el)return;
  let al={sedentary:'Sedentary',lightlyActive:'Lightly Active',moderatelyActive:'Moderately Active',veryActive:'Very Active'};
  let gl={maintain:'Maintain weight',lose:'Lose weight slowly',gain:'Gain weight slowly'};
  el.innerHTML=`<div class="nav-header"><span class="nav-title">Profile</span></div><div class="screen-content"><div class="card"><span class="t-label" style="display:block;margin-bottom:14px">Your Details</span><div class="profile-row"><span class="profile-row-lbl">Age</span><span class="profile-row-val">${P.age}</span></div><div class="profile-row"><span class="profile-row-lbl">Sex</span><span class="profile-row-val">${P.sex==='female'?'Female':'Male'}</span></div><div class="profile-row"><span class="profile-row-lbl">Height</span><span class="profile-row-val">${P.height} cm</span></div><div class="profile-row"><span class="profile-row-lbl">Weight</span><span class="profile-row-val">${P.weight} kg</span></div><div class="profile-row"><span class="profile-row-lbl">Activity</span><span class="profile-row-val">${al[P.activity]}</span></div><div class="profile-row"><span class="profile-row-lbl">Goal</span><span class="profile-row-val">${gl[P.goal]}</span></div></div>${CT?`<div class="card"><span class="t-label" style="display:block;margin-bottom:14px">Calorie Target</span><div style="display:flex;align-items:baseline;gap:8px"><span class="t-hero" style="color:var(--accent);font-size:32px">${CT.target.toLocaleString()}</span><span class="t-caption">kcal/day</span></div><div style="display:flex;gap:16px;margin-top:8px"><span class="t-caption">BMR <b>${CT.bmr.toLocaleString()}</b></span><span class="t-caption">Maintenance <b>${CT.maintenance.toLocaleString()}</b></span></div></div>`:''}<p class="disclaimer">This is an estimate for planning purposes only. Consult a qualified health professional for medical advice.</p><button class="btn btn-secondary" onclick="renderEditProfile();onav('profile-edit')">Edit Profile</button><button class="btn btn-secondary" onclick="calc();renderCalResult();renderProfile();onav('profile')">Recalculate Target</button><button class="btn btn-secondary" onclick="resetData()">Reset Data</button></div>`;
  addConceptNav('profile');
}

function renderEditProfile(){
  let el=document.getElementById('profile-edit'); if(!el)return;
  el.innerHTML=`<div class="nav-header"><button class="nav-back" onclick="renderProfile();onav('profile')">←</button><span class="nav-title">Edit Profile</span></div><div class="screen-content compact"><div class="form-group"><span class="form-label">Age</span><div class="stepper"><button onclick="stp('age',-1)">−</button><span class="val" id="vae-age">${P.age}</span><button onclick="stp('age',1)">+</button></div></div><div class="form-group"><span class="form-label">Sex</span><div class="segmented" id="sg-sex-e"><button class="${P.sex==='female'?'active':''}" onclick="sel('sex','female',this)">Female</button><button class="${P.sex==='male'?'active':''}" onclick="sel('sex','male',this)">Male</button></div></div><div class="form-group"><span class="form-label">Height (cm)</span><div class="stepper"><button onclick="stp('height',-1)">−</button><span class="val" id="vae-height">${P.height}</span><button onclick="stp('height',1)">+</button></div></div><div class="form-group"><span class="form-label">Weight (kg)</span><div class="stepper"><button onclick="stp('weight',-1)">−</button><span class="val" id="vae-weight">${P.weight}</span><button onclick="stp('weight',1)">+</button></div></div><div class="form-group"><span class="form-label">Activity</span><div class="segmented" id="sg-activity-e" style="flex-wrap:wrap"><button class="${P.activity==='sedentary'?'active':''}" onclick="sel('activity','sedentary',this)">Sedentary</button><button class="${P.activity==='lightlyActive'?'active':''}" onclick="sel('activity','lightlyActive',this)">Lightly Active</button><button class="${P.activity==='moderatelyActive'?'active':''}" onclick="sel('activity','moderatelyActive',this)">Moderate</button><button class="${P.activity==='veryActive'?'active':''}" onclick="sel('activity','veryActive',this)">Very Active</button></div></div><div class="form-group"><span class="form-label">Goal</span><div class="segmented" id="sg-goal-e" style="flex-direction:column;gap:4px"><button class="${P.goal==='maintain'?'active':''}" onclick="sel('goal','maintain',this)">Maintain weight</button><button class="${P.goal==='lose'?'active':''}" onclick="sel('goal','lose',this)">Lose weight</button><button class="${P.goal==='gain'?'active':''}" onclick="sel('goal','gain',this)">Gain weight</button></div></div><div style="flex:1"></div><button class="btn btn-primary" onclick="saveEditProfile()">Save</button><button class="btn btn-secondary" onclick="renderProfile();onav('profile')">Cancel</button></div>`;
}

function saveEditProfile(){P.age=parseInt(document.getElementById('vae-age')?.textContent)||P.age;P.height=parseInt(document.getElementById('vae-height')?.textContent)||P.height;P.weight=parseInt(document.getElementById('vae-weight')?.textContent)||P.weight;calc();renderProfile();onav('profile');}
function resetData(){if(!confirm('Reset all data?'))return;P={age:30,sex:'female',height:170,weight:70,activity:'sedentary',goal:'maintain'};CT=null;mealPlans={};switchConcept('ring',document.querySelector('[data-concept="ring"]'));}
function renderEmptyState(){return`<div class="nav-header"><span class="nav-title">Today</span></div><div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">No meal plan yet</div><div class="empty-body">Create one to start tracking your daily calories.</div><button class="btn btn-primary" style="width:auto;padding:14px 36px" onclick="crtPlan();renderRingToday();onav('today')">Create Meal Plan</button></div>`;}

function addConceptNav(activeTab){
  let phone=document.getElementById('phone');
  phone.querySelectorAll('.ring-tabs').forEach(e=>e.remove());
  phone.insertAdjacentHTML('beforeend',`<div class="ring-tabs">
    <button class="ring-tab${activeTab==='today'?' active':''}" onclick="selectedDateKey=TODAY_KEY;renderRingToday();onav('today')"><span class="ring-tab-icon">⏺</span>Today</button>
    <button class="ring-tab${activeTab==='plan'?' active':''}" onclick="renderRingPlan();onav('plan')"><span class="ring-tab-icon">📅</span>Plan</button>
    <button class="ring-tab${activeTab==='insights'?' active':''}" onclick="renderRingInsights();onav('insights')"><span class="ring-tab-icon">📈</span>Insights</button>
    <button class="ring-tab${activeTab==='profile'?' active':''}" onclick="renderProfile();onav('profile')"><span class="ring-tab-icon">⚙</span>Profile</button>
  </div>`);
}

function switchConcept(concept, el){
  document.querySelectorAll('.concept-option').forEach(c=>c.classList.remove('active'));
  if(el)el.classList.add('active');
  let phone=document.getElementById('phone');
  phone.className='phone theme-ring';
  phone.innerHTML=`<div class="phone-status"><span>9:41</span><span style="display:flex;gap:6px">●●●●○ WiFi 🔋</span></div>`;
  phone.insertAdjacentHTML('beforeend',`<div class="screen" id="welcome"></div>
    <div class="screen screen-scroll" id="profile-setup"></div>
    <div class="screen screen-scroll" id="goal-setup"></div>
    <div class="screen screen-scroll" id="calorie-result"></div>
    <div class="screen screen-scroll active" id="today"></div>
    <div class="screen screen-scroll" id="plan"></div>
    <div class="screen screen-scroll" id="insights"></div>
    <div class="screen screen-scroll" id="profile"></div>
    <div class="screen screen-scroll" id="profile-edit"></div>
    <div class="screen screen-scroll" id="add-food"></div>`);
  selectedDateKey = TODAY_KEY;
  weekOffset = 0;
  renderRingToday(); currentScreen='today';
  document.getElementById('welcome').innerHTML=renderOnboarding('welcome');
  document.getElementById('profile-setup').innerHTML=renderOnboarding('profile-setup');
  document.getElementById('goal-setup').innerHTML=renderOnboarding('goal-setup');
  if(CT)renderCalResult();
  document.getElementById('profile').innerHTML=''; document.getElementById('profile-edit').innerHTML='';
  renderProfile();
}
